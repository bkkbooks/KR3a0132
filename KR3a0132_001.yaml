body:
  text: 庭誥富則盛貧則病甚矣貧之為病也不唯形色粗黶或亦神心沮喪非但交友疏棄必有家人誚讓非廉潔深識者何能不交移其植故蠲憂患莫若懷古之志當自同古人見深則憂淺識遠則患浮昔有琴歌於編蓬之中用此道也歐陽詢藝文類聚卷三十五善施者豈惟發自人心乃出天財太平御覽卷四百七十七喜怒者有性所不能無常起於褊量而止於宏識然喜過則不重怒過則不威能以恬淡為體寬愈為器美矣大喜蕩心微抑則定甚怒煩性稍忍即歇故動無墮容止無失度則為善也欲求子孝必先為慈將責弟悌務念為友雖孝不待慈而慈能植孝悌非期友而友亦立悌夫和之不備或應以不和猶信之不足焉必應以不信儻知恩意相生情理相出可使家有參差人皆由損枚叔有言欲人勿聞莫若勿為禦寒莫若重裘止謗莫若自修論語曰內省不疚何憂何惟太平御覽卷五百九十三觀書貴要觀要貴博博而知要萬流可一詠歌之詩要其連類合章比物集句採風謠以達民志詩為之祖春秋褒貶之書取其正言晦義輔制衰王微辭豐旨貽意盛明春秋為上易首體備能事之淵馬陸得其象數而失其成理荀王舉其正宗而略其象數四家之見雖各為所志總而論之性情出乎徹明氣數生于形分然則荀王得之于心馬陸取之于物其善惡迄可知矣夫數象窮則大極著人心極則神功彰若荀王之言易可謂極人心之數者也太平御覽卷六百八荀爽云詩者古之歌章然則雅頌之樂篇全矣是以後之詩者率以歌為名及秦勒望嶽漢祀郊宮辭著前史者文變之高制也雖雅聲未至宏麗難追矣逮李陵衆作總雜不類是假託非盡陵制至其善篇有足悲者摯虞文論足稱優洽柏梁以來繼作非一纂至七言而已九言不見者將由聲度闡緩不協金石仲冶之言未可據詩周南關睢孔頴達正義至於五言流靡則劉楨張華四言側密則張衡王粲若夫陳思王可謂兼之矣太平御覽卷五百八十六火含煙而煙妨火桂懷蠹而蠹殘桂然火勝則煙滅蠹壯則桂折太平御覽卷八百七十一
